<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Preview — 代码截图工具</title>
<link rel="icon" href="https://boluo66.top/favimg/?url=boluo66.top">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root { --bg: #0d0d12; --card: #14141c; --border: rgb(255 255 255 / .06); --text: #c4c4cc; --muted: #6b6b78; --accent: #615ced; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: Inter, system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}
header {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 32px; border-bottom: 1px solid var(--border);
}
header h1 { font-size: 18px; font-weight: 700; }
header span { font-size: 13px; color: var(--muted); margin-left: 8px; }
header a { color: var(--muted); font-size: 13px; text-decoration: none; margin-left: auto; }
.container { display: flex; height: calc(100vh - 61px); }
.editor { flex: 1; display: flex; flex-direction: column; }
.editor textarea {
  flex: 1; width: 100%; padding: 24px;
  background: var(--card); border: 0; border-right: 1px solid var(--border);
  color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 14px; line-height: 1.6; resize: none; outline: none;
  tab-size: 2;
}
.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: var(--card); border-top: 1px solid var(--border);
}
.toolbar select, .toolbar button {
  height: 32px; padding: 0 12px;
  background: #0d0d12; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px;
  cursor: pointer; outline: none;
}
.toolbar select:focus { border-color: var(--accent); }
.toolbar button {
  background: var(--accent); border-color: var(--accent);
  font-weight: 600;
}
.toolbar button:hover { background: #5249d4; }
.toolbar .sep { color: var(--muted); font-size: 13px; }
.toolbar input[type=color] {
  width: 28px; height: 28px; border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; padding: 0; background: none;
}
.preview {
  flex: 1; display: flex; align-items: flex-start; justify-content: flex-start;
  padding: 32px; overflow: auto;
}
.preview-inner {
  min-width: 400px; max-width: 100%;
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 4px 20px rgb(0 0 0 / .3);
}
.preview-header {
  display: flex; gap: 8px; padding: 12px 16px;
  background: #1a1a24; align-items: center;
}
.preview-header .dot { width: 10px; height: 10px; border-radius: 50%; }
.preview-header .dot:nth-child(1) { background: #ff5f56; }
.preview-header .dot:nth-child(2) { background: #ffbd2e; }
.preview-header .dot:nth-child(3) { background: #27c93f; }
.preview-header .lang-tag {
  margin-left: auto; font-size: 11px; color: #6e7681;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.preview-code {
  padding: 20px 24px; font-size: 14px; line-height: 1.6;
  overflow-x: auto;
}
.preview-code pre { margin: 0; }
.preview-code code {
  font-family: 'SF Mono', 'Fira Code', monospace !important;
  white-space: pre-wrap; word-break: break-all;
}

/* Override Prism colors */
.token.comment, .token.prolog, .token.doctype, .token.cdata { color: #6e7681; }
.token.punctuation { color: #c9d1d9; }
.token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol, .token.deleted { color: #79c0ff; }
.token.selector, .token.attr-name, .token.string, .token.char, .token.builtin, .token.inserted { color: #a5d6ff; }
.token.operator, .token.entity, .token.url { color: #d2a8ff; }
.token.atrule, .token.attr-value, .token.keyword { color: #ff7b72; }
.token.function, .token.class-name { color: #d2a8ff; }
.token.regex, .token.important, .token.variable { color: #ffa657; }

@media (max-width: 768px) {
  .container { flex-direction: column; }
  .editor { height: 50%; }
  .preview { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1>Code Preview <span>· 代码截图</span></h1>
  <a href="/toolkit/" onclick="if(document.referrer && document.referrer.includes('toolkit')){history.back();return false}" style="color:var(--muted);text-decoration:none;font-size:14px">← 工具箱</a>
</header>

<div class="container">
  <div class="editor">
    <textarea id="code" placeholder="粘贴代码到这里..."
>function hello(name) {
  return `你好, ${name}!`;
}

// 支持 JS/TS/Python/Go/Rust/SQL 等
const result = hello("世界");
console.log(result);</textarea>
    <div class="toolbar">
      <select id="lang">
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="css">CSS</option>
        <option value="json">JSON</option>
        <option value="markup">HTML</option>
        <option value="bash">Bash</option>
        <option value="sql">SQL</option>
        <option value="rust">Rust</option>
        <option value="go">Go</option>
        <option value="java">Java</option>
        <option value="yaml">YAML</option>
      </select>
      <span class="sep">背景</span>
      <input type="color" id="bgColor" value="#1a1b26">
      <button id="download">📥 下载 PNG</button>
    </div>
  </div>
  <div class="preview" id="previewArea">
    <div class="preview-inner" id="card">
      <div class="preview-header" id="previewHeader">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span class="lang-tag" id="langTag">JAVASCRIPT</span>
      </div>
      <div class="preview-code" id="previewCode">
        <pre><code class="language-javascript" id="highlighted">function hello(name) {
  return `你好, ${name}!`;
}

// 支持 JS/TS/Python/Go/Rust/SQL 等
const result = hello("世界");
console.log(result);</code></pre>
      </div>
    </div>
  </div>
</div>

<script>
const codeEl = document.getElementById('code');
const langEl = document.getElementById('lang');
const bgEl = document.getElementById('bgColor');
const downloadBtn = document.getElementById('download');
const card = document.getElementById('card');
const langTag = document.getElementById('langTag');
const previewCode = document.getElementById('previewCode');
const previewHeader = document.getElementById('previewHeader');
const highlighted = document.getElementById('highlighted');

const LANG_NAMES = {
  javascript: 'JavaScript', typescript: 'TypeScript', python: 'Python',
  css: 'CSS', json: 'JSON', markup: 'HTML', bash: 'Bash', sql: 'SQL',
  rust: 'Rust', go: 'Go', java: 'Java', yaml: 'YAML'
};

function update() {
  const code = codeEl.value;
  const lang = langEl.value;
  
  highlighted.className = `language-${lang}`;
  highlighted.textContent = code;
  Prism.highlightElement(highlighted);
  
  langTag.textContent = LANG_NAMES[lang] || lang;
  
  const bg = bgEl.value;
  previewHeader.style.background = bg;
  previewCode.style.background = bg;
  
  // Slightly darken code area for better contrast
  const r = parseInt(bg.slice(1,3), 16);
  const g = parseInt(bg.slice(3,5), 16);
  const b = parseInt(bg.slice(5,7), 16);
  const darker = `rgb(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)})`;
  previewHeader.style.background = darker;
}

codeEl.addEventListener('input', update);
langEl.addEventListener('change', update);
bgEl.addEventListener('input', update);

async function download() {
  const canvas = await html2canvas(card, {
    backgroundColor: null,
    scale: 2,
  });
  const link = document.createElement('a');
  link.download = `code-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

downloadBtn.addEventListener('click', download);

// Init
update();
</script>
</body>
</html>
