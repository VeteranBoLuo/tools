<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp — 时间戳转换</title>
<link rel="icon" href="https://boluo66.top/favimg/?url=boluo66.top">
<style>
:root { --bg: #0d0d12; --card: #14141c; --border: rgb(255 255 255 / .06); --text: #c4c4cc; --muted: #6b6b78; --accent: #615ced; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
header { text-align: center; margin-bottom: 40px; }
header h1 { font-size: 28px; font-weight: 800; }
header span { font-size: 14px; color: var(--muted); }
header a { color: var(--muted); font-size: 13px; text-decoration: none; display: block; margin-top: 12px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; max-width: 520px; width: 100%; margin-bottom: 16px; }
.row { display: flex; gap: 10px; align-items: center; }
input, select { flex: 1; height: 44px; padding: 0 14px; background: #0d0d12; border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 15px; font-family: 'SF Mono', 'Fira Code', monospace; outline: none; }
input:focus, select:focus { border-color: var(--accent); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.now-btn { height: 44px; padding: 0 16px; background: var(--accent); border: 0; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.now-btn:hover { background: #5249d4; }
.result { margin-top: 14px; }
.result .label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
.result .value { font-size: 20px; font-weight: 700; color: #79c0ff; font-family: 'SF Mono', 'Fira Code', monospace; word-break: break-all; }
.result .value.small { font-size: 16px; font-weight: 600; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--muted); }
.live { font-size: 13px; color: var(--muted); text-align: center; margin-top: 8px; }
.live span { color: #3fb950; font-family: 'SF Mono', monospace; }
</style>
</head>
<body>

<header>
  <h1>Timestamp <span>· 时间戳转换</span></h1>
  <a href="/toolkit/">← 工具箱</a>
</header>

<div class="card">
  <h3>时间戳 → 日期</h3>
  <div class="row">
    <input id="tsInput" type="number" placeholder="输入时间戳，如 1750000000" oninput="tsToDate()">
    <button class="now-btn" onclick="setNow()">当前</button>
  </div>
  <div class="result" id="tsResult"></div>
</div>

<div class="card">
  <h3>日期 → 时间戳</h3>
  <div class="row">
    <input id="dateInput" type="datetime-local" oninput="dateToTs()">
    <select id="unit" onchange="dateToTs()">
      <option value="s">秒</option>
      <option value="ms">毫秒</option>
    </select>
  </div>
  <div class="result" id="dateResult"></div>
</div>

<div class="live">
  当前时间戳（秒）<br><span id="liveTs"></span>
</div>

<script>
const tsInput = document.getElementById('tsInput');
const dateInput = document.getElementById('dateInput');
const unitEl = document.getElementById('unit');
const tsResult = document.getElementById('tsResult');
const dateResult = document.getElementById('dateResult');
const liveTs = document.getElementById('liveTs');

function tsToDate() {
  const raw = tsInput.value.trim();
  if (!raw) { tsResult.innerHTML = ''; return; }
  let ts = parseInt(raw, 10);
  if (ts > 9999999999999) ts = Math.floor(ts / 1000);
  if (ts < 0 || ts > 9999999999) { tsResult.innerHTML = '<div class="value" style="color:#ff7b72">无效时间戳</div>'; return; }
  const d = new Date(ts * 1000);
  tsResult.innerHTML = `
    <div class="label">UTC</div><div class="value">${d.toISOString().replace('T', ' ').slice(0, 19)}</div>
    <div class="label" style="margin-top:8px">本地时间</div><div class="value">${d.toLocaleString('zh-CN', { hour12: false })}</div>
    <div class="label" style="margin-top:8px">相对</div><div class="value small">${relative(d)}</div>
  `;
}

function dateToTs() {
  const val = dateInput.value;
  if (!val) { dateResult.innerHTML = ''; return; }
  const d = new Date(val);
  const ts = unitEl.value === 'ms' ? d.getTime() : Math.floor(d.getTime() / 1000);
  dateResult.innerHTML = `
    <div class="label">${unitEl.value === 'ms' ? '毫秒' : '秒'}</div>
    <div class="value">${ts.toLocaleString()}</div>
  `;
}

function setNow() {
  tsInput.value = Math.floor(Date.now() / 1000);
  tsToDate();
}

function relative(d) {
  const diff = Date.now() - d.getTime();
  const abs = Math.abs(diff);
  const sec = Math.floor(abs / 1000);
  if (sec < 60) return sec + ' 秒' + (diff > 0 ? '前' : '后');
  const min = Math.floor(sec / 60);
  if (min < 60) return min + ' 分钟' + (diff > 0 ? '前' : '后');
  const hour = Math.floor(min / 60);
  if (hour < 24) return hour + ' 小时' + (diff > 0 ? '前' : '后');
  const day = Math.floor(hour / 24);
  if (day < 30) return day + ' 天' + (diff > 0 ? '前' : '后');
  const mon = Math.floor(day / 30);
  if (mon < 12) return mon + ' 个月' + (diff > 0 ? '前' : '后');
  return Math.floor(mon / 12) + ' 年' + (diff > 0 ? '前' : '后');
}

// Init
dateInput.value = new Date().toISOString().slice(0, 16);
dateToTs();
setInterval(() => { liveTs.textContent = Math.floor(Date.now() / 1000); }, 1000);
</script>
</body>
</html>
