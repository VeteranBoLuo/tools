<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Playground · 接口调试器 — 开发者工具箱</title>
  <link rel="icon" href="https://boluo66.top/favimg/?url=boluo66.top">
  <style>
    :root {
      --bg: #0d0d12;
      --card: #14141c;
      --border: rgb(255 255 255 / .06);
      --text: #c4c4cc;
      --muted: #6b6b78;
      --accent: #615ced;
      --ok: #3fb950;
      --err: #ff7b72;
      --warn: #d2991d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: 14px;
      padding: 12px 24px; flex-shrink: 0;
      transition: color .15s;
    }
    .back:hover { color: var(--text); }

    .header {
      padding: 0 24px 12px; flex-shrink: 0;
    }
    .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .header .sub { color: var(--muted); font-size: 13px; }

    /* Split layout */
    .split {
      display: flex; flex: 1; min-height: 0; padding: 0 24px 16px; gap: 16px;
    }
    .left-pane {
      width: 480px; min-width: 380px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 12px;
      overflow: hidden;
    }
    .left-pane .card.headers-card {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .left-pane .card.headers-card .card-bd {
      flex: 1; min-height: 0; overflow-y: auto;
    }
    .right-pane {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }

    /* Request URL row */
    .req-row {
      display: flex; gap: 8px;
    }
    .req-row select {
      width: 100px; flex-shrink: 0;
      height: 40px; padding: 0 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 13px;
      outline: none; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b6b78' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 10px center;
      padding-right: 28px;
    }
    .req-row select:focus { border-color: var(--accent); }
    .req-row select option { background: var(--card); color: #fff; }
    .req-row input {
      flex: 1; height: 40px; padding: 0 14px; min-width: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 13px;
      outline: none; font-family: 'SF Mono','Fira Code',monospace;
      transition: border-color .2s;
    }
    .req-row input:focus { border-color: var(--accent); }
    .req-row input::placeholder { color: #484f58; }

    .send-btn {
      height: 40px; padding: 0 20px; flex-shrink: 0;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Section card */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .card-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; transition: background .15s;
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .card-hd:hover { background: rgba(255,255,255,.02); }
    .card-hd .badge {
      font-size: 11px; color: var(--muted); background: rgba(255,255,255,.04);
      padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    }
    .card-hd .arrow { font-size: 11px; color: var(--muted); transition: transform .2s; margin-left: auto; }
    .card-hd.collapsed .arrow { transform: rotate(-90deg); }
    .card-bd { padding: 12px 14px; }
    .card-bd.hidden { display: none; }

    /* Headers */
    .h-row {
      display: flex; gap: 6px; margin-bottom: 6px; align-items: center;
    }
    .h-row input {
      height: 32px; padding: 0 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: #fff; font-size: 12px;
      outline: none; font-family: 'SF Mono','Fira Code',monospace;
      transition: border-color .2s;
    }
    .h-row input:focus { border-color: var(--accent); }
    .h-row .h-k { flex: 1; min-width: 0; }
    .h-row .h-v { flex: 2; min-width: 0; }
    .h-del {
      width: 32px; height: 32px; flex-shrink: 0;
      background: rgba(255,123,114,.1); border: 1px solid rgba(255,123,114,.2);
      border-radius: 6px; color: var(--err); cursor: pointer;
      font-size: 14px; transition: background .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .h-del:hover { background: rgba(255,123,114,.2); }
    .add-h {
      margin-top: 6px; padding: 6px 14px;
      background: rgba(255,255,255,.04); border: 1px dashed var(--border);
      border-radius: 6px; color: var(--muted); cursor: pointer;
      font-size: 12px; transition: all .15s; display: inline-block;
    }
    .add-h:hover { border-color: var(--accent); color: var(--accent); }

    /* Body */
    .body-type {
      display: flex; gap: 0; margin-bottom: 8px;
    }
    .body-type button {
      padding: 5px 14px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px;
      cursor: pointer; transition: all .15s;
    }
    .body-type button:first-child { border-radius: 6px 0 0 6px; }
    .body-type button:last-child { border-radius: 0 6px 6px 0; }
    .body-type button:not(:last-child) { border-right: none; }
    .body-type button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .body-type button:hover:not(.active) { color: var(--text); }
    .body-ta {
      width: 100%; min-height: 120px; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: #a5b4c4; font-size: 12px;
      font-family: 'SF Mono','Fira Code',monospace; line-height: 1.5;
      outline: none; resize: vertical; transition: border-color .2s;
    }
    .body-ta:focus { border-color: var(--accent); }
    .body-ta::placeholder { color: #484f58; }

    /* Response */
    .resp-bar {
      display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-shrink: 0;
    }
    .resp-stat {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--bg); border-radius: 8px;
    }
    .resp-stat .code {
      font-size: 18px; font-weight: 700;
    }
    .resp-stat .time {
      font-size: 12px; color: var(--muted);
    }
    .resp-stat.s2xx .code { color: var(--ok); }
    .resp-stat.s3xx .code { color: var(--warn); }
    .resp-stat.s4xx .code { color: var(--err); }
    .resp-stat.s5xx .code { color: var(--err); }
    .resp-stat.serr .code { color: var(--err); }

    .resp-tabs {
      display: flex; gap: 0; margin-bottom: 8px; flex-shrink: 0;
    }
    .resp-tabs button {
      padding: 6px 16px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px;
      cursor: pointer; transition: all .15s;
    }
    .resp-tabs button:first-child { border-radius: 6px 0 0 6px; }
    .resp-tabs button:last-child { border-radius: 0 6px 6px 0; }
    .resp-tabs button:not(:last-child) { border-right: none; }
    .resp-tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .resp-tabs button:hover:not(.active) { color: var(--text); }

    .resp-view {
      flex: 1; min-height: 0; overflow: auto;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; line-height: 1.6;
    }
    .resp-view.hidden { display: none; }

    /* JSON syntax */
    .json-body { white-space: pre-wrap; word-break: break-all; }
    .json-body .key { color: #7cb8ff; }
    .json-body .str { color: #a5e075; }
    .json-body .num { color: #d19a66; }
    .json-body .bool { color: #d19a66; }
    .json-body .null { color: #d19a66; }
    .json-body .err { color: var(--err); }
    .json-body .raw { color: #a5b4c4; }
    .json-body .tag { color: #6e7681; font-size: 11px; }

    /* Headers table */
    .hdr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .hdr-table td {
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .hdr-table tr:last-child td { border-bottom: none; }
    .hdr-table .hdr-k { color: #7cb8ff; white-space: nowrap; width: 200px; }
    .hdr-table .hdr-v { color: #a5b4c4; word-break: break-all; }

    /* Status */
    .waiting {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px;
    }
    .waiting .big-icon { font-size: 40px; margin-bottom: 12px; }
    .waiting .hint { color: #484f58; font-size: 12px; margin-top: 4px; }

    .copy-btn {
      padding: 4px 12px; margin-left: auto;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); cursor: pointer;
      font-size: 11px; transition: all .15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    .resp-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    @media (max-width: 900px) {
      .split { flex-direction: column; overflow-y: auto; }
      .left-pane { width: 100%; min-width: 0; }
      .right-pane { min-height: 300px; }
      body { height: auto; overflow: auto; }
    }
  </style>
</head>
<body>

<a href="/toolkit/" class="back">← 工具箱</a>
<div class="header">
  <h1>API Playground</h1>
  <div class="sub">REST 接口调试器 — 发请求看响应，不装客户端</div>
</div>

<div class="split">
  <!-- Left: Request Builder -->
  <div class="left-pane">
    <div class="req-row">
      <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="PATCH">PATCH</option>
        <option value="DELETE">DELETE</option>
        <option value="HEAD">HEAD</option>
        <option value="OPTIONS">OPTIONS</option>
      </select>
      <input type="text" id="url" placeholder="https://api.example.com/endpoint" value="">
      <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
    </div>

    <div class="card headers-card">
      <div class="card-hd" onclick="toggleC(this)">
        Headers <span class="badge" id="hCount">0</span>
        <span class="arrow">▼</span>
      </div>
      <div class="card-bd" id="hBody">
        <div id="hList"></div>
        <button class="add-h" onclick="addH()">+ Header</button>
      </div>
    </div>

    <div class="card">
      <div class="card-hd" onclick="toggleC(this)">
        Body
        <span class="arrow">▼</span>
      </div>
      <div class="card-bd" id="bBody">
        <div class="body-type">
          <button class="active" data-type="json" onclick="switchBT(this)">JSON</button>
          <button data-type="text" onclick="switchBT(this)">Text</button>
          <button data-type="none" onclick="switchBT(this)">None</button>
        </div>
        <textarea class="body-ta" id="bInput" placeholder='{&#10;  "key": "value"&#10;}'></textarea>
      </div>
    </div>
  </div>

  <!-- Right: Response Display -->
  <div class="right-pane">
    <div class="resp-bar" id="respBar" style="display:none">
      <div class="resp-stat" id="respStat">
        <span class="code" id="rCode">—</span>
        <span class="time" id="rTime">—</span>
      </div>
      <div class="resp-tabs" style="margin-bottom:0">
        <button class="active" onclick="switchRT(this,'body')">Body</button>
        <button onclick="switchRT(this,'headers')">Headers</button>
      </div>
      <button class="copy-btn" onclick="copyResp()">📋 复制</button>
    </div>
    <div class="resp-view" id="rBody"><div class="resp-placeholder">
      <div class="big-icon">🔌</div>
      <div>输入 URL 并发送</div>
      <div class="hint">支持 GET / POST / PUT / PATCH / DELETE</div>
    </div></div>
    <div class="resp-view hidden" id="rHdrs"></div>
  </div>
</div>

<script>
let hId = 0;
let lastBody = '';
let lastHdrs = {};

function toggleC(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}

function addH(k, v) {
  const id = ++hId;
  const d = document.getElementById('hList');
  const r = document.createElement('div'); r.className = 'h-row';
  r.innerHTML = '<input class="h-k" placeholder="Key" value="'+(k||'')+'">'
    + '<input class="h-v" placeholder="Value" value="'+(v||'')+'">'
    + '<button class="h-del" onclick="this.parentElement.remove();updH()">✕</button>';
  d.appendChild(r);
  updH();
}
function updH() {
  document.getElementById('hCount').textContent = document.querySelectorAll('#hList .h-row').length;
}

function switchBT(el) {
  document.querySelectorAll('.body-type button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('bInput').disabled = el.dataset.type === 'none';
}

function getHdrs() {
  const h = {};
  document.querySelectorAll('#hList .h-row').forEach(r => {
    const k = r.querySelector('.h-k').value.trim();
    const v = r.querySelector('.h-v').value.trim();
    if (k) h[k] = v;
  });
  return h;
}

async function send() {
  const btn = document.getElementById('sendBtn');
  const url = document.getElementById('url').value.trim();
  const method = document.getElementById('method').value;
  const rBody = document.getElementById('rBody');
  const rHdrs = document.getElementById('rHdrs');
  const rBar = document.getElementById('respBar');

  if (!url) { rBody.innerHTML = '<div class="resp-placeholder"><div class="err" style="color:var(--err)">请输入 URL</div></div>'; return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    rBody.innerHTML = '<div class="resp-placeholder"><div class="err" style="color:var(--err)">URL 必须以 http:// 或 https:// 开头</div></div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  rBody.innerHTML = '<div class="resp-placeholder"><span class="spinner"></span><div class="hint" style="margin-top:12px">请求中...</div></div>';
  rHdrs.classList.add('hidden');
  rBody.classList.remove('hidden');
  rBar.style.display = 'none';
  document.querySelectorAll('.resp-tabs button').forEach((b,i) => b.classList.toggle('active', i===0));

  const hdrs = getHdrs();
  let body = null;
  const bt = document.querySelector('.body-type .active').dataset.type;
  if (bt === 'json') {
    body = document.getElementById('bInput').value;
    if (body) {
      try { JSON.parse(body); } catch(e) {
        rBody.innerHTML = '<div class="resp-placeholder"><div class="err" style="color:var(--err)">JSON 格式错误：' + esc(e.message) + '</div></div>';
        btn.disabled = false; btn.innerHTML = '发送'; return;
      }
    }
    if (!hdrs['Content-Type'] && !hdrs['content-type']) hdrs['Content-Type'] = 'application/json';
  } else if (bt === 'text') {
    body = document.getElementById('bInput').value;
    if (!hdrs['Content-Type'] && !hdrs['content-type']) hdrs['Content-Type'] = 'text/plain';
  }

  const start = Date.now();
  try {
    const resp = await fetch(url, {
      method,
      headers: hdrs,
      body: ['GET','HEAD'].includes(method) ? null : (body || null),
    });
    const elapsed = Date.now() - start;

    const resHdrs = {};
    resp.headers.forEach((v, k) => { resHdrs[k] = v; });
    lastHdrs = resHdrs;

    const ct = (resp.headers.get('content-type') || '').toLowerCase();
    let txt = '';
    if (ct.includes('application/json') || ct.includes('text/')) {
      txt = await resp.text();
    } else {
      txt = '[Binary: ' + (ct || 'unknown') + ']';
    }
    lastBody = txt;

    renderResp(resp.status, elapsed, txt, ct, resHdrs);
  } catch(e) {
    const elapsed = Date.now() - start;
    renderErr(e.message, elapsed);
  }

  btn.disabled = false;
  btn.innerHTML = '发送';
}

function renderResp(status, elapsed, body, ct, hdrs) {
  const rBar = document.getElementById('respBar');
  const rStat = document.getElementById('respStat');
  document.getElementById('rCode').textContent = status;
  document.getElementById('rTime').textContent = elapsed + 'ms';
  rStat.className = 'resp-stat s' + String(status)[0] + 'xx';
  rBar.style.display = 'flex';

  // Body tab
  const rBody = document.getElementById('rBody');
  if (ct.includes('application/json')) {
    try {
      const parsed = JSON.parse(body);
      rBody.innerHTML = '<div class="json-body">' + formatJSON(parsed) + '</div>';
    } catch(e) {
      rBody.innerHTML = '<div class="json-body">' + esc(body) + '</div>';
    }
  } else if (ct.includes('text/html')) {
    rBody.innerHTML = '<div class="json-body"><span class="tag">&lt;!-- HTML response, showing first 2000 chars --&gt;</span>\n\n' + esc(body.slice(0,2000)) + '</div>';
  } else {
    rBody.innerHTML = '<div class="json-body">' + esc(body) + '</div>';
  }

  // Headers tab
  const rHdrs = document.getElementById('rHdrs');
  let html = '<table class="hdr-table">';
  for (const [k, v] of Object.entries(hdrs)) {
    html += '<tr><td class="hdr-k">' + esc(k) + '</td><td class="hdr-v">' + esc(v) + '</td></tr>';
  }
  html += '</table>';
  rHdrs.innerHTML = html;

  rBody.classList.remove('hidden');
  rHdrs.classList.add('hidden');
}

function renderErr(msg, elapsed) {
  const rBar = document.getElementById('respBar');
  const rStat = document.getElementById('respStat');
  document.getElementById('rCode').textContent = 'ERR';
  document.getElementById('rTime').textContent = elapsed + 'ms';
  rStat.className = 'resp-stat serr';
  rBar.style.display = 'flex';

  document.getElementById('rBody').innerHTML = '<div class="json-body"><span class="err">⚠ ' + esc(msg) + '</span></div>';
  document.getElementById('rHdrs').classList.add('hidden');
  document.getElementById('rBody').classList.remove('hidden');
}

function formatJSON(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  const pad1 = '  '.repeat(indent + 1);
  if (obj === null) return '<span class="null">null</span>';
  if (typeof obj === 'boolean') return '<span class="bool">' + obj + '</span>';
  if (typeof obj === 'number') return '<span class="num">' + obj + '</span>';
  if (typeof obj === 'string') return '<span class="str">' + esc(obj) + '</span>';

  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    let html = '[\n';
    for (let i = 0; i < obj.length; i++) {
      html += pad1 + formatJSON(obj[i], indent + 1);
      if (i < obj.length - 1) html += ',';
      html += '\n';
    }
    html += pad + ']';
    return html;
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    let html = '{\n';
    for (let i = 0; i < keys.length; i++) {
      html += pad1 + '<span class="key">"' + esc(keys[i]) + '"</span>: ' + formatJSON(obj[keys[i]], indent + 1);
      if (i < keys.length - 1) html += ',';
      html += '\n';
    }
    html += pad + '}';
    return html;
  }

  return esc(String(obj));
}

function switchRT(el, tab) {
  document.querySelectorAll('.resp-tabs button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('rBody').classList.toggle('hidden', tab !== 'body');
  document.getElementById('rHdrs').classList.toggle('hidden', tab !== 'headers');
}

function copyResp() {
  const isBody = document.getElementById('rBody').classList.contains('hidden') === false;
  const text = isBody ? lastBody : JSON.stringify(lastHdrs, null, 2);
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '📋 复制', 1500);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

addH('Content-Type', 'application/json');
</script>

</body>
</html>
