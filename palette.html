<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette — 配色生成</title>
<link rel="icon" href="https://boluo66.top/favimg/?url=boluo66.top">
<style>
:root { --bg: #0d0d12; --card: #14141c; --border: rgb(255 255 255 / .06); --text: #c4c4cc; --muted: #6b6b78; --accent: #615ced; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, sans-serif; min-height: 100vh; }
header { display: flex; align-items: center; gap: 16px; padding: 16px 24px; border-bottom: 1px solid var(--border); max-width: 900px; margin: 0 auto; }
header h1 { font-size: 18px; font-weight: 700; }
header span { font-size: 13px; color: var(--muted); }
header a { color: var(--muted); font-size: 13px; text-decoration: none; margin-left: auto; }
.page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

/* Hero gradient preview */
.hero-gradient { width: 100%; height: 200px; border-radius: 16px; margin-bottom: 28px; position: relative; overflow: hidden; cursor: pointer; transition: transform .2s; }
.hero-gradient:hover { transform: scale(1.01); }
.hero-gradient .copy-hint { position: absolute; bottom: 12px; right: 16px; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #fff; opacity: 0; transition: opacity .2s; pointer-events: none; }
.hero-gradient:hover .copy-hint { opacity: 1; }

/* Input controls */
.input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 36px; flex-wrap: wrap; }
.input-row input[type=text] { flex: 1; min-width: 160px; height: 44px; padding: 0 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 15px; font-family: 'SF Mono', monospace; outline: none; text-transform: uppercase; }
.input-row input[type=text]:focus { border-color: var(--accent); }
.input-row input[type=color] { width: 44px; height: 44px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: none; padding: 2px; }
.input-row input[type=color]:hover { border-color: var(--accent); }
.input-row button { height: 44px; padding: 0 20px; border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
.input-row button:hover { opacity: .85; }
.btn-gen { background: var(--accent); color: #fff; }
.btn-rand { background: var(--card); color: var(--text); border: 1px solid var(--border) !important; }

/* Color info bar */
.color-bar { display: flex; gap: 24px; align-items: center; margin-bottom: 32px; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
.color-bar .info { display: flex; gap: 24px; flex-wrap: wrap; }
.color-bar .info-item { }
.color-bar .info-item .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.color-bar .info-item .val { font-size: 15px; font-weight: 600; font-family: 'SF Mono', monospace; margin-top: 2px; color: #fff; }

/* Schemes grid */
.schemes { display: grid; gap: 20px; }
.scheme { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
.scheme-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.scheme-header h3 { font-size: 15px; font-weight: 600; }
.scheme-header .copy-all { font-size: 12px; color: var(--accent); cursor: pointer; }
.scheme-header .copy-all:hover { opacity: .8; }
.swatches { display: flex; gap: 1px; border-radius: 8px; overflow: hidden; height: 48px; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.swatch { flex: 1; cursor: pointer; transition: flex .15s; position: relative; }
.swatch:hover { flex: 1.8; }
.swatch .tip { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: 'SF Mono', monospace; white-space: nowrap; opacity: 0; transition: opacity .1s; color: #fff; pointer-events: none; z-index: 2; }
.swatch:hover .tip { opacity: 1; }

/* Color dot list for schemes without gradient bar */
.color-dots { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 0; }
.color-dot { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 10px 6px 6px; border-radius: 8px; transition: background .15s; }
.color-dot:hover { background: rgba(255,255,255,.04); }
.color-dot .dot { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; }
.color-dot .info .h { font-size: 13px; font-weight: 600; font-family: 'SF Mono', monospace; color: #fff; }
.color-dot .info .d { font-size: 11px; color: var(--muted); }

.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #2ea043; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 600px) {
  .page { padding: 24px 16px; }
  .hero-gradient { height: 140px; }
  .color-bar .info { gap: 12px; }
  .color-bar .info-item .val { font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <h1>Palette <span>· 配色生成</span></h1>
  <a href="/toolkit/">← 工具箱</a>
</header>

<div class="page">
  <!-- Input controls -->
  <div class="input-row">
    <input type="text" id="hexInput" value="#615ced" maxlength="7" onchange="update()">
    <input type="color" id="colorPicker" value="#615ced" onchange="fromPicker()">
    <button class="btn-gen" onclick="update()">生成</button>
    <button class="btn-rand" onclick="randomize()">🎲 随机</button>
  </div>

  <!-- Hero gradient preview -->
  <div class="hero-gradient" id="heroGradient" onclick="copyGradientCSS()">
    <span class="copy-hint">📋 复制渐变 CSS</span>
  </div>

  <!-- Color info bar -->
  <div class="color-bar" id="colorBar"></div>

  <!-- Schemes -->
  <div class="schemes" id="schemes"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const hexInput = document.getElementById('hexInput');
const picker = document.getElementById('colorPicker');
const hero = document.getElementById('heroGradient');
const schemes = document.getElementById('schemes');
const colorBar = document.getElementById('colorBar');
const toast = document.getElementById('toast');

let currentGradientCSS = '';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function hexToHSL(h) {
  h = h.replace('#','');
  const r = parseInt(h.slice(0,2),16)/255, g = parseInt(h.slice(2,4),16)/255, b = parseInt(h.slice(4,6),16)/255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
  let hh=0, s=0, l=(mx+mn)/2;
  if (mx !== mn) {
    const d = mx-mn;
    s = l>.5 ? d/(2-mx-mn) : d/(mx+mn);
    if (mx===r) hh = ((g-b)/d+(g<b?6:0))/6;
    else if (mx===g) hh = ((b-r)/d+2)/6;
    else hh = ((r-g)/d+4)/6;
  }
  return [Math.round(hh*360), Math.round(s*100), Math.round(l*100)];
}

function HSLtoHex(h,s,l) {
  s/=100; l/=100;
  const a = s*Math.min(l,1-l);
  const f = n => { const k=(n+h/30)%12; return l - a*Math.max(Math.min(k-3,9-k,1),-1); };
  return '#'+[0,8,4].map(x=>Math.round(255*f(x)).toString(16).padStart(2,'0')).join('');
}

function adjust(h,s,l, dh,ds,dl=0) {
  return HSLtoHex(((h+dh)%360+360)%360, Math.max(0,Math.min(100,s+ds)), Math.max(0,Math.min(100,l+dl)));
}

function hexToRGB(h) {
  h = h.replace('#','');
  return `${parseInt(h.slice(0,2),16)}, ${parseInt(h.slice(2,4),16)}, ${parseInt(h.slice(4,6),16)}`;
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(() => showToast('✅ 已复制'));
}

function copyGradientCSS() {
  copyText(currentGradientCSS);
}

function update() {
  let val = hexInput.value.trim();
  if (!val || val[0]!=='#') val = '#' + val.replace('#','');
  if (!/^#[0-9a-f]{6}$/i.test(val)) return;
  hexInput.value = val.toUpperCase();
  picker.value = val;
  build(val);
}

function fromPicker() {
  hexInput.value = picker.value.toUpperCase();
  build(picker.value);
}

function randomize() {
  const r = () => Math.floor(Math.random()*256).toString(16).padStart(2,'0');
  const c = '#'+r()+r()+r();
  hexInput.value = c.toUpperCase();
  picker.value = c;
  build(c);
}

function build(base) {
  const [h,s,l] = hexToHSL(base);
  const h2 = adjust(h,s,l,30,5,5);
  const h3 = adjust(h,s,l,180,0,-5);
  const h4 = adjust(h,s,l,90,-10,10);

  // Scheme 1: Complementary palette (bar)
  const comp = [
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,180,0,0),
    adjust(h,s,l,180,10,10),
    adjust(h,s,l,0,-10,-10),
    adjust(h,s,l,180,0,-15),
  ];

  // Scheme 2: Triadic palette (bar)
  const tri = [
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,120,0,0),
    adjust(h,s,l,240,0,0),
    adjust(h,s,l,120,5,10),
    adjust(h,s,l,240,-5,-10),
  ];

  // Scheme 3: Analogous palette (bar) 
  const ana = [
    adjust(h,s,l,-45,0,0),
    adjust(h,s,l,-22,0,0),
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,22,0,0),
    adjust(h,s,l,45,0,0),
  ];

  // Scheme 4: Monochrome gradient (bar)
  const mono = [
    adjust(h,s,l,0,0,45),
    adjust(h,s,l,0,0,25),
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,0,-15,-15),
    adjust(h,s,l,0,-25,-30),
  ];

  // Scheme 5: Sunset/creative gradient
  const sunset = [
    base,
    adjust(h,s,l,30,15,5),
    adjust(h,s,l,60,20,-10),
    adjust(h,s,l,180,-10,10),
    adjust(h,s,l,270,-5,-5),
  ];

  // Scheme 6: Vibrant multi-color
  const vibrant = [
    base,
    adjust(h,s,l,60,20,10),
    adjust(h,s,l,120,10,-5),
    adjust(h,s,l,240,5,5),
    adjust(h,s,l,300,15,-10),
  ];

  // Scheme 7: Split complementary
  const splitComp = [
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,150,0,0),
    adjust(h,s,l,210,0,0),
    adjust(h,s,l,150,5,10),
    adjust(h,s,l,210,-5,-10),
  ];

  // Scheme 8: Tetradic (rectangle)
  const tetra = [
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,60,0,0),
    adjust(h,s,l,180,0,0),
    adjust(h,s,l,240,0,0),
    adjust(h,s,l,60,10,10),
  ];

  // Scheme 9: Pastel / soft
  const pastel = [
    adjust(h,s,l,0,-20,35),
    adjust(h,s,l,60,-25,32),
    adjust(h,s,l,180,-20,35),
    adjust(h,s,l,240,-15,30),
    adjust(h,s,l,300,-20,33),
  ];

  // Scheme 10: Dark theme palette
  const dark = [
    adjust(h,s,l,0,0,-40),
    adjust(h,s,l,0,0,-25),
    adjust(h,s,l,0,0,0),
    adjust(h,s,l,45,10,5),
    adjust(h,s,l,180,-5,10),
  ];

  // Gradient for hero
  const g1 = base;
  const g2 = adjust(h,s,l,180,10,10);
  const g3 = adjust(h,s,l,60,15,5);
  currentGradientCSS = `linear-gradient(135deg, ${g1}, ${g2}, ${g3})`;
  hero.style.background = currentGradientCSS;

  // Color info
  const rgb = hexToRGB(base);
  colorBar.innerHTML = `
    <div class="info">
      <div class="info-item"><div class="lbl">HEX</div><div class="val">${base.toUpperCase()}</div></div>
      <div class="info-item"><div class="lbl">RGB</div><div class="val">${rgb}</div></div>
      <div class="info-item"><div class="lbl">HSL</div><div class="val">${h}° ${s}% ${l}%</div></div>
    </div>
  `;

  // Helper to make gradient bar with color details below
  const bar = (colors, label, descriptions) => {
    const stops = colors.map((c,i) => `${c} ${i*25}%`).join(', ');
    const gradCSS = `linear-gradient(90deg, ${stops})`;
    const dots = colors.map(c => `
      <div class="swatch" style="background:${c}" onclick="copyText('${c}')">
        <span class="tip">${c}</span>
      </div>
    `).join('');
    const details = colors.map((c,i) => `
      <div class="color-dot" onclick="copyText('${c}')">
        <div class="dot" style="background:${c}"></div>
        <div class="info"><div class="h">${c}</div><div class="d">${descriptions[i]||''}</div></div>
      </div>
    `).join('');
    return `<div class="scheme"><div class="scheme-header"><h3>${label}</h3><span class="copy-all" onclick="copyText('${gradCSS.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">📋 复制渐变</span></div><div class="swatches">${dots}</div><div class="color-dots">${details}</div></div>`;
  };

  // Helper for dot-based schemes (flex)
  const dotsScheme = (colors, label, descriptions) => {
    const items = colors.map((c,i) => `
      <div class="color-dot" onclick="copyText('${c}')">
        <div class="dot" style="background:${c}"></div>
        <div class="info"><div class="h">${c}</div><div class="d">${descriptions[i]||''}</div></div>
      </div>
    `).join('');
    return `<div class="scheme"><div class="scheme-header"><h3>${label}</h3></div><div class="color-dots">${items}</div></div>`;
  };

  schemes.innerHTML = [
    bar(comp, '互补色 · Complementary', ['主色','互补色','互补浅色','深色','最深']),
    bar(splitComp, '分裂互补 · Split Complementary', ['主色','分裂色','分裂色','浅色','深色']),
    bar(tri, '三角色 · Triadic', ['主色','三角色','三角色','浅色','深色']),
    bar(tetra, '矩形色 · Tetradic', ['主色','第二色','第三色','第四色','浅色']),
    bar(ana, '邻近色 · Analogous', ['左邻色','邻近色','主色','邻近色','右邻色']),
    dotsScheme(mono, '单色渐变 · Monochromatic', ['最浅','浅色','主色','深色','最深']),
    dotsScheme(pastel, '柔和色调 · Pastel', ['粉色','暖色','冷色','紫色','珊瑚']),
    dotsScheme(dark, '深色模式 · Dark Mode', ['背景色','暗色','主色','强调色','高亮色']),
    `<div class="scheme"><div class="scheme-header"><h3>创意渐变 · Creative</h3></div><div class="color-dots">${[
      [sunset,'日落·Sunset'],
      [vibrant,'活力·Vibrant'],
    ].map(([colors,label]) => {
      const gradCSS = `linear-gradient(135deg, ${colors.join(', ')})`;
      return `<div class="color-dot" onclick="copyText('${gradCSS.replace(/'/g,"\\'")}')"><div class="dot" style="background:${gradCSS};width:48px;height:48px;border-radius:8px"></div><div class="info"><div class="h">${label}</div><div class="d">点击复制 CSS</div></div></div>`;
    }).join('')}</div></div>`,
  ].join('');
}

// Init
update();
</script>
</body>
</html>
