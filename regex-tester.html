<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正则测试 — 工具箱</title>
<style>
:root {
  --bg: #0d0d12;
  --card: #14141c;
  --border: rgba(255,255,255,.06);
  --text: #c4c4cc;
  --muted: #6e7681;
  --accent: #615ced;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
header a { color: var(--muted); text-decoration: none; font-size: 14px; }
header a:hover { color: var(--text); }
header h1 { font-size: 20px; font-weight: 600; }
.main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1400px; margin: 0 auto; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font: 14px/1.6 'SF Mono', 'Fira Code', monospace; padding: 10px 14px; outline: none; resize: vertical; }
input:focus, textarea:focus { border-color: var(--accent); }
textarea { min-height: 200px; }
.regex-row { display: flex; gap: 8px; align-items: flex-start; }
.regex-row input { flex: 1; font-size: 18px; padding: 14px 16px; }
.flags { display: flex; gap: 4px; margin-top: 8px; }
.flag { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font: 14px system-ui; transition: .15s; }
.flag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.flag:hover:not(.active) { border-color: var(--text); color: var(--text); }
.stats { display: flex; gap: 16px; margin: 8px 0 0; font-size: 13px; color: var(--muted); }
.stats span { color: var(--accent); font-weight: 600; }
.output { margin-top: 16px; }
.match-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.match-item .pos { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.match-item .txt { font: 14px/1.5 'SF Mono', 'Fira Code', monospace; color: var(--text); }
.match-item .txt mark { background: rgba(97,92,237,.3); color: #fff; padding: 1px 3px; border-radius: 3px; }
.groups { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.group { font-size: 12px; padding: 3px 8px; background: rgba(255,255,255,.04); border-radius: 4px; color: var(--muted); }
.group strong { color: #a78bfa; }
.error { color: #ff7b72; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <a href="/toolkit/">← 工具箱</a>
  <h1>regex-tester · 正则测试</h1>
</header>

<div class="card" style="margin-bottom:16px">
  <h2>正则表达式</h2>
  <div class="regex-row">
    <input id="regex" placeholder="/pattern/" value="1[3-9]\d{9}" oninput="run()" autofocus>
  </div>
  <div class="flags">
    <button class="flag active" data-flag="g" onclick="toggleFlag(this)">g</button>
    <button class="flag" data-flag="i" onclick="toggleFlag(this)">i</button>
    <button class="flag" data-flag="m" onclick="toggleFlag(this)">m</button>
    <button class="flag" data-flag="s" onclick="toggleFlag(this)">s</button>
    <button class="flag" data-flag="u" onclick="toggleFlag(this)">u</button>
  </div>
  <div class="error" id="error"></div>
</div>

<div class="card" style="margin-bottom:16px">
  <h2>测试文本</h2>
  <textarea id="text" oninput="run()" placeholder="粘贴要测试的文本...">13812345678
15987654321
18611223344</textarea>
  <div class="stats">
    <div>匹配: <span id="count">0</span></div>
    <div>分组: <span id="groups-count">0</span></div>
  </div>
</div>

<div class="card" style="margin-bottom:16px">
  <h2>匹配结果</h2>
  <div class="output" id="output">
    <div style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center">输入正则和测试文本开始匹配</div>
  </div>
</div>

<script>
const flags = ['g','i','m','s','u'];

function getFlags() {
  return flags.filter(f => document.querySelector(`[data-flag="${f}"]`).classList.contains('active')).join('');
}

function toggleFlag(btn) {
  btn.classList.toggle('active');
  run();
}

function run() {
  const pattern = document.getElementById('regex').value;
  const text = document.getElementById('text').value;
  const errEl = document.getElementById('error');
  const outEl = document.getElementById('output');
  const countEl = document.getElementById('count');
  const gcEl = document.getElementById('groups-count');

  errEl.textContent = '';
  countEl.textContent = '0';
  gcEl.textContent = '0';

  if (!pattern) {
    outEl.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center">输入正则表达式</div>';
    return;
  }

  let re;
  try {
    var B = String.fromCharCode(92); re = new RegExp(pattern.split(B).join(B+B), getFlags());
  } catch(e) {
    errEl.textContent = '正则无效: ' + e.message;
    outEl.innerHTML = '';
    return;
  }

  if (!text) {
    outEl.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center">输入测试文本</div>';
    return;
  }

  const isGlobal = re.global || re.sticky;
  const matches = isGlobal ? [...text.matchAll(re)] : (() => { const m = text.match(re); return m ? [m] : []; })();

  countEl.textContent = matches.length;

  if (matches.length === 0) {
    outEl.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0;text-align:center">无匹配</div>';
    return;
  }

  let totalGroups = 0;
  let html = '';
  matches.forEach((m, idx) => {
    const before = text.slice(Math.max(0, m.index - 20), m.index);
    const matched = m[0];
    const after = text.slice(m.index + matched.length, m.index + matched.length + 20);
    const ctx = (before ? '...' : '') + before + '<mark>' + matched + '</mark>' + after + (after.length >= 20 ? '...' : '');

    let groups = '';
    if (m.length > 1) {
      const groupItems = [];
      for (let i = 1; i < m.length; i++) {
        if (m[i] != null) { groupItems.push(i + ': ' + m[i]); totalGroups++; }
      }
      if (groupItems.length) groups = '<div class="groups">' + groupItems.map(g => '<div class="group"><strong>\\' + g + '</strong></div>').join('') + '</div>';
    }

    html += '<div class="match-item"><div class="pos">匹配 #' + (idx + 1) + ' · 位置 ' + m.index + '</div><div class="txt">' + ctx + '</div>' + groups + '</div>';
  });

  gcEl.textContent = totalGroups;
  outEl.innerHTML = html;
}

run();
</script>
</body>
</html>
